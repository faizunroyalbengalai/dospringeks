# UDAP: in-memory H2 datasource for `mvn test`. Production
# uses src/main/resources/application.properties + the
# SPRING_DATASOURCE_* env vars set by the deploy pipeline.
spring.datasource.url=jdbc:h2:mem:udaptest;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
